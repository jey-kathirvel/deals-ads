services:
  deals:
    environment:
      AMAZON_CREATORS_CREDENTIAL_ID: ${AMAZON_CREATORS_CREDENTIAL_ID}
      AMAZON_CREATORS_CREDENTIAL_SECRET: ${AMAZON_CREATORS_CREDENTIAL_SECRET}
      AMAZON_CREATORS_CREDENTIAL_VERSION: ${AMAZON_CREATORS_CREDENTIAL_VERSION}
      AMAZON_PARTNER_TAG: ${AMAZON_PARTNER_TAG}
      AMAZON_MARKETPLACE: ${AMAZON_MARKETPLACE}
    build: .
    container_name: ads-ai-deals
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    ports:
      - "127.0.0.1:8089:3000"
