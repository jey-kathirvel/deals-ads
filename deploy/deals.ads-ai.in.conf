<VirtualHost *:80>
    ServerName deals.ads-ai.in

    ProxyPreserveHost On
    ProxyPass / http://127.0.0.1:8089/ retry=0 timeout=60
    ProxyPassReverse / http://127.0.0.1:8089/

    RequestHeader set X-Forwarded-Proto "http"
    ErrorLog ${APACHE_LOG_DIR}/deals-error.log
    CustomLog ${APACHE_LOG_DIR}/deals-access.log combined
</VirtualHost>
